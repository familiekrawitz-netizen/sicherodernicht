<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>sicherodernicht | Newsletter bestätigen</title>
    <link rel="stylesheet" href="/styles.css?v=96" />
  </head>
  <body class="subpage-body">
    <main class="subpage-shell legal-shell">
      <a class="back-link" href="/index.html">← sicherodernicht</a>

      <section class="subpage-hero glass legal-hero">
        <p class="chip">Newsletter</p>
        <h1>E-Mail-Bestätigung</h1>
        <p id="newsletterConfirmLead">
          Wir prüfen gerade deinen Bestätigungslink. Einen Moment bitte.
        </p>
      </section>

      <section class="panel-card legal-card legal-wide-card">
        <div class="legal-block">
          <p id="newsletterConfirmStatus">Bestätigung wird geladen ...</p>
          <p>
            Falls der Link nicht funktioniert, kannst du die Registrierung später erneut mit derselben oder einer neuen
            E-Mail-Adresse durchführen.
          </p>
        </div>
      </section>
    </main>

    <script>
      (async function () {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || '';
        const lead = document.getElementById('newsletterConfirmLead');
        const status = document.getElementById('newsletterConfirmStatus');

        if (!token) {
          lead.textContent = 'Der Bestätigungslink ist unvollständig.';
          status.textContent = 'Bitte prüfe, ob der Link vollständig kopiert wurde.';
          return;
        }

        try {
          const response = await fetch(`/api/newsletter/confirm?token=${encodeURIComponent(token)}`);
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            lead.textContent = 'Die Bestätigung war nicht erfolgreich.';
            status.textContent = payload.error || 'Der Link ist ungültig oder bereits verbraucht.';
            return;
          }
          lead.textContent = 'Deine E-Mail-Einwilligung ist jetzt bestätigt.';
          status.textContent = payload.message || 'Die Anmeldung zu Neuigkeiten per E-Mail wurde aktiviert.';
        } catch (error) {
          lead.textContent = 'Die Bestätigung konnte gerade nicht geladen werden.';
          status.textContent = 'Bitte versuche es später noch einmal.';
        }
      })();
    </script>
  </body>
</html>
